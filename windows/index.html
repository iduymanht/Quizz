<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quiz Pet</title>
<style>
  :root {
    --card: rgba(23, 26, 43, 0.92);
    --bar: rgba(30, 34, 54, 0.96);
    --border: rgba(120, 130, 180, 0.28);
    --text: #eef0fa;
    --muted: #a6acc9;
    --brand: #4da3ff;
    --brand2: #8fd0ff;
    --ok: #34d399;
    --okbg: rgba(52, 211, 153, 0.16);
    --bad: #ff6b6b;
    --badbg: rgba(255, 107, 107, 0.16);
    --shadow: 0 10px 34px rgba(0,0,0,.45);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--text); -webkit-font-smoothing: antialiased;
    display: flex; align-items: flex-end; justify-content: center;
    user-select: none;
  }
  #app { width: 560px; max-width: 100vw; padding: 12px; }

  /* question bar: one horizontal line above the pet's head */
  .qbar {
    background: var(--bar); border: 1px solid var(--border); border-radius: 999px;
    padding: 12px 20px; font-size: 15px; font-weight: 700; text-align: center;
    box-shadow: var(--shadow); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    -webkit-app-region: drag; /* let the whole bar drag the desktop window */
  }
  .qbar .qnum { color: var(--brand); margin-right: 6px; }

  /* stage: 2 answers left · pet · 2 answers right */
  .stage {
    display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px;
    align-items: center; margin-top: 12px;
  }
  .col { display: grid; gap: 10px; align-content: center; }

  .ans {
    -webkit-app-region: no-drag;
    display: flex; align-items: center; gap: 9px; width: 100%; text-align: left;
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    border-radius: 12px; padding: 11px 13px; font-size: 13.5px; font-weight: 600;
    cursor: pointer; transition: .12s; box-shadow: var(--shadow); min-height: 56px;
  }
  .ans:hover:not(:disabled) { border-color: var(--brand); transform: translateY(-1px); }
  .ans:disabled { cursor: default; }
  .ans .key {
    flex: none; width: 26px; height: 26px; border-radius: 8px; display: grid; place-items: center;
    background: rgba(77, 163, 255,.18); color: var(--brand); font-weight: 800; font-size: 13px;
  }
  .ans.correct { border-color: var(--ok); background: var(--okbg); }
  .ans.correct .key { background: var(--ok); color: #06281d; }
  .ans.wrong { border-color: var(--bad); background: var(--badbg); }
  .ans.wrong .key { background: var(--bad); color: #2b0d0d; }

  .petwrap { display: flex; flex-direction: column; align-items: center; width: 150px; position: relative; }
  /* Click/tap effects on the pet (like the original PetHearts). */
  .heart { position: absolute; left: 50%; bottom: 46%; font-size: 16px; pointer-events: none;
    will-change: transform, opacity; animation: floatHeart .9s ease-out forwards; }
  @keyframes floatHeart {
    0%   { transform: translate(var(--dx), 0) scale(var(--s)); opacity: .95; }
    100% { transform: translate(var(--dx), -78px) scale(calc(var(--s) * .4)); opacity: 0; }
  }
  #petCanvas.bounce { animation: petBounce .38s ease; }
  @keyframes petBounce {
    0% { transform: scale(1); } 28% { transform: scale(1.14); }
    60% { transform: scale(.93); } 100% { transform: scale(1); }
  }
  .speech {
    max-width: 150px; min-height: 0; margin-bottom: 6px; padding: 7px 12px;
    background: white; color: #1a1d2b; border-radius: 12px; font-size: 12.5px; font-weight: 700;
    box-shadow: var(--shadow); text-align: center; position: relative; opacity: 0;
    transition: opacity .18s; pointer-events: none;
  }
  .speech.show { opacity: 1; }
  .speech::after {
    content: ""; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
    border: 6px solid transparent; border-top-color: white; border-bottom: 0;
  }
  .speech.thanks { background: #d6ffe9; color: #06432e; }
  .speech.thanks::after { border-top-color: #d6ffe9; }
  .speech.sad { background: #ffe0e0; color: #6b1414; }
  .speech.sad::after { border-top-color: #ffe0e0; }
  #petCanvas { width: 132px; height: 132px; -webkit-app-region: drag; }

  .explain {
    margin-top: 12px; background: var(--card); border: 1px solid var(--border);
    border-left: 3px solid var(--bad); border-radius: 10px; padding: 11px 14px;
    font-size: 12.5px; color: var(--muted); box-shadow: var(--shadow); display: none;
  }
  .explain.show { display: block; }
  .explain b { color: var(--text); }

  .footer { display: flex; gap: 8px; justify-content: center; margin-top: 12px; -webkit-app-region: no-drag; }
  .btn {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    border-radius: 9px; padding: 8px 14px; font-size: 12.5px; font-weight: 700; cursor: pointer;
    box-shadow: var(--shadow); transition: .12s;
  }
  .btn:hover { border-color: var(--brand); }
  .btn.primary { background: linear-gradient(135deg, var(--brand), var(--brand2)); border: 0; }
  .btn.hidden { display: none; }
  .empty { text-align: center; color: var(--muted); background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 22px; box-shadow: var(--shadow); font-size: 13.5px; }
</style>
</head>
<body>
<div id="app">
  <div id="content"><!-- filled by JS --></div>
</div>

<script src="/pet-sprite.js"></script>
<script src="/quiz-store.js"></script>
<script>
"use strict";
const PET_KEY = "quiz_selected_pet";

const SAMPLE = [
  { text: "Thủ đô của Việt Nam là gì?",
    options: [{text:"TP. Hồ Chí Minh",correct:false},{text:"Hà Nội",correct:true},{text:"Đà Nẵng",correct:false},{text:"Huế",correct:false}],
    explanation: "Hà Nội là thủ đô của Việt Nam từ năm 1010 (thời Lý)." },
  { text: "2 + 2 bằng mấy?",
    options: [{text:"3",correct:false},{text:"4",correct:true},{text:"5",correct:false},{text:"22",correct:false}],
    explanation: "Phép cộng cơ bản: 2 + 2 = 4." },
];

const THANKS = ["Cảm ơn bạn! 🎉", "Tuyệt vời! 🌟", "Chuẩn luôn! 💯", "Giỏi quá! 🥰"];
const SADS = ["Tiếc quá…", "Suýt rồi 😢", "Chưa đúng rồi…", "Ơ, sai mất rồi 😞"];

let questions = SAMPLE;
let idx = 0;
let answered = false;
let player = null;
let pets = [];
let petIdx = 0;

function usable(qs) {
  const valid = (Array.isArray(qs) ? qs : []).filter(x => x && x.text && (x.options||[]).some(o => o.correct));
  return valid.length ? valid : SAMPLE;
}
async function refreshQuestions() {
  const qs = await QuizStore.loadQuestions();
  questions = usable(qs);
  if (idx >= questions.length) idx = 0;
}
// Live reload when the builder saves (macOS bridge / Tauri event call this).
window.__quizReload = function (json) {
  let qs = [];
  try { qs = typeof json === "string" ? JSON.parse(json) : (json || []); } catch (e) {}
  questions = usable(qs);
  idx = 0; render();
};
function rand(a) { return a[Math.floor(Math.random() * a.length)]; }
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

function setMood(mood, fps) {
  if (!player) return;
  player.setClip(PetSprite.clipForMood(mood, player.clipCount), fps);
}
function say(text, cls) {
  const el = document.getElementById("speech");
  if (!el) return;
  el.textContent = text;
  el.className = "speech show " + (cls || "");
}
function clearSay() {
  const el = document.getElementById("speech");
  if (el) el.className = "speech";
}

function render() {
  const q = questions[idx];
  const opts = q.options.slice(0, 4);
  // pad to 4 for stable 2-left / 2-right layout
  while (opts.length < 4) opts.push({ text: "", correct: false, _pad: true });
  const letter = i => String.fromCharCode(65 + i);
  const ansHTML = i => opts[i]._pad ? "" :
    `<button class="ans" data-i="${i}" onclick="choose(${i})">
       <span class="key">${letter(i)}</span><span>${esc(opts[i].text)}</span>
     </button>`;

  document.getElementById("content").innerHTML = `
    <div class="qbar"><span class="qnum">Câu ${idx + 1}/${questions.length}</span>${esc(q.text)}</div>
    <div class="stage">
      <div class="col left">${ansHTML(0)}${ansHTML(1)}</div>
      <div class="petwrap">
        <div id="speech" class="speech"></div>
        <canvas id="petCanvas" width="264" height="264" onclick="petTapped()"></canvas>
      </div>
      <div class="col right">${ansHTML(2)}${ansHTML(3)}</div>
    </div>
    <div id="explain" class="explain"></div>
    <div class="footer">
      <button id="nextBtn" class="btn primary hidden" onclick="next()">Câu tiếp →</button>
    </div>`;

  answered = false;
  attachPetCanvas();
  applyPetSize();
  setMood("idle", 4);
}

// Pet size (phóng to / thu nhỏ). Stored in localStorage, applied to the canvas.
function applyPetSize() {
  const px = parseInt(localStorage.getItem("quiz_pet_size") || "132", 10);
  const c = document.getElementById("petCanvas");
  const wrap = document.querySelector(".petwrap");
  if (c) { c.style.width = px + "px"; c.style.height = px + "px"; }
  if (wrap) { wrap.style.width = Math.max(px + 18, 110) + "px"; }
}
window.__petResize = function (px) {
  if (px) localStorage.setItem("quiz_pet_size", String(px));
  applyPetSize();
};

function choose(i) {
  if (answered) return;
  const q = questions[idx];
  const opt = q.options[i];
  answered = true;
  const buttons = document.querySelectorAll(".ans");
  buttons.forEach(b => { b.disabled = true; });

  if (opt && opt.correct) {
    buttons[i] && buttons[i].classList.add("correct");
    setMood("happy", 8);
    say(rand(THANKS), "thanks");
    document.getElementById("nextBtn").classList.remove("hidden");
    setTimeout(() => { if (answered) next(); }, 1500);
  } else {
    buttons[i] && buttons[i].classList.add("wrong");
    // reveal the correct one
    q.options.forEach((o, k) => { if (o.correct && buttons[k]) buttons[k].classList.add("correct"); });
    setMood("sad", 6);
    say(rand(SADS), "sad");
    const ex = document.getElementById("explain");
    ex.innerHTML = q.explanation
      ? `<b>💡 Giải thích:</b> ${esc(q.explanation)}`
      : `<b>Đáp án đúng:</b> ${esc((q.options.find(o=>o.correct)||{}).text || "")}`;
    ex.classList.add("show");
    document.getElementById("nextBtn").classList.remove("hidden");
  }
}

function next() {
  idx = (idx + 1) % questions.length;
  render();
}

// ---- pet rendering ----
async function attachPetCanvas() {
  const canvas = document.getElementById("petCanvas");
  if (!canvas || !pets.length) return;
  const slug = pets.length ? pets[petIdx].slug : null;
  const animate = localStorage.getItem("quiz_anim") !== "0";
  try {
    if (!slug) throw new Error("no pets");
    const pack = await PetSprite.loadPack(`/pets/${slug}/spritesheet.webp`);
    player = PetSprite.createPlayer(canvas, pack, { fps: 4, animate });
    setMood("idle", 4);
  } catch (e) {
    console.warn("pet load failed:", e);
    drawFallbackPet(canvas);
  }
}
// Always-visible placeholder so the pet area is never empty.
function drawFallbackPet(canvas) {
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.font = (canvas.width * 0.6) + "px serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("🐱", canvas.width / 2, canvas.height / 2);
}
// Petting the pet: it says something loving (speech bubble) + a little bounce.
const LOVES = ["Yêu bạn 💕", "Thương lắm 🥰", "I love you! ❤️", "❤️ ❤️ ❤️", "Bạn tuyệt nhất! 💖", "Mê bạn ghê 😽"];
let petHappyTimer = null, loveTimer = null;
function petTapped() {
  const canvas = document.getElementById("petCanvas");
  if (canvas) { canvas.classList.remove("bounce"); void canvas.offsetWidth; canvas.classList.add("bounce"); }
  say(rand(LOVES), "thanks");
  clearTimeout(loveTimer);
  loveTimer = setTimeout(() => { if (!answered) clearSay(); }, 1700);
  if (!answered) {
    setMood("happy", 8);
    clearTimeout(petHappyTimer);
    petHappyTimer = setTimeout(() => { if (!answered) setMood("idle", 4); }, 900);
  }
}

// Switch to a specific pet (called live from the Settings → Pet tab).
window.__petReload = function (slug) {
  const i = pets.findIndex(p => p.slug === slug);
  if (i < 0) return;
  petIdx = i;
  localStorage.setItem(PET_KEY, slug);
  if (player) player.stop();
  attachPetCanvas();
};

// Right-click the pet → open the Settings window (Pet + Quiz tabs).
function openSettings() {
  if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.quiz) {
    window.webkit.messageHandlers.quiz.postMessage({ action: "openSettings" });
  } else if (window.__TAURI__ && window.__TAURI__.core) {
    try { window.__TAURI__.core.invoke("show_settings"); } catch (e) {}
  } else {
    location.href = "settings.html";
  }
}
window.addEventListener("contextmenu", (e) => { e.preventDefault(); openSettings(); });

async function loadPets() {
  try {
    const r = await fetch("/pets/pets.json");
    pets = await r.json();
  } catch (e) { pets = []; }
  const saved = localStorage.getItem(PET_KEY);
  const i = pets.findIndex(p => p.slug === saved);
  petIdx = i >= 0 ? i : 0;
}

// Render immediately with defaults (SAMPLE questions + fallback pet) so the
// overlay is never blank, then load pets/questions in the background.
render();

(async function init() {
  try { await loadPets(); } catch (e) { console.warn("loadPets", e); }
  try { await refreshQuestions(); } catch (e) { console.warn("refreshQuestions", e); }
  render(); // re-render with the loaded pet + saved questions
  // Tauri: react to changes made in the Settings window.
  if (window.__TAURI__ && window.__TAURI__.event) {
    try {
      window.__TAURI__.event.listen("questions-updated", (e) => window.__quizReload(e.payload));
      window.__TAURI__.event.listen("pet-changed", (e) => window.__petReload(e.payload));
      window.__TAURI__.event.listen("pet-resized", (e) => window.__petResize(e.payload));
    } catch (e) {}
  }
})();
</script>
</body>
</html>
